name: Release

# Cut a new release when a tag of the form v1.2.3 is pushed. Packages the
# CaptureImage.App project as a single-file self-contained Win64 build,
# wraps it in a Velopack installer, and uploads the result to a GitHub
# Release matching the tag.
#
# Code signing is NOT performed yet (SignPath application was declined).
# The installer will trigger Windows SmartScreen "Unknown publisher" until
# a signing cert is available. Users can verify the build manually by
# comparing SHA256 sums — see docs/RELEASING.md §5.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (without leading v, e.g. 1.0.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # needed to create a GitHub Release

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      PACK_ID: CaptureImage
      MAIN_EXE: CaptureImage.App.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $v = $env:GITHUB_REF -replace "^refs/tags/v", ""
          } elseif ("${{ github.event.inputs.version }}" -ne "") {
            $v = "${{ github.event.inputs.version }}"
          } else {
            throw "No tag and no manual version supplied."
          }
          Write-Host "Resolved version: $v"
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore + test
        run: |
          dotnet restore CaptureImage.sln
          dotnet test CaptureImage.sln -c Release --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Publish CaptureImage.App (win-x64 self-contained)
        run: >
          dotnet publish src/CaptureImage.App/CaptureImage.App.csproj
          -c Release
          -r win-x64
          --self-contained
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true
          /p:Version=${{ steps.version.outputs.version }}
          /p:AssemblyVersion=${{ steps.version.outputs.version }}.0
          /p:FileVersion=${{ steps.version.outputs.version }}.0
          -o ./publish

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk

      - name: Add dotnet tools to PATH
        shell: pwsh
        run: echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Download previous release (for delta generation)
        # Velopack only emits a *-delta.nupkg when it finds a previous full package
        # in --outputDir. Fetching the last GitHub release before pack gives the
        # Update tab a working incremental path from n-1 → n. Safe to continue-on-error:
        # a first-ever release has nothing to download and we just publish full.
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force -Path ./releases | Out-Null
          vpk download github --repoUrl https://github.com/${{ github.repository }} --outputDir ./releases --channel win

      - name: Velopack pack
        # --channel win produces the modern releases.win.json manifest alongside the
        # legacy RELEASES file, which is what Velopack clients >= 0.0.900 poll for.
        # --delta BestSize keeps the hotfix payload small (typical v1.1.0 → v1.1.1
        # delta is a few MB vs the ~55 MB full).
        run: >
          vpk pack
          --packId ${{ env.PACK_ID }}
          --packVersion ${{ steps.version.outputs.version }}
          --packDir ./publish
          --mainExe ${{ env.MAIN_EXE }}
          --outputDir ./releases
          --channel win
          --delta BestSize

      - name: Compute SHA256 sums
        shell: pwsh
        run: |
          $outDir = "./releases"
          Get-ChildItem $outDir -File | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File -FilePath "$outDir\SHA256SUMS.txt" -Append -Encoding utf8
          }
          Get-Content "$outDir\SHA256SUMS.txt"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: captureimage-release-${{ steps.version.outputs.version }}
          path: ./releases/**
          retention-days: 30

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: CaptureImage v${{ steps.version.outputs.version }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ./releases/*.exe
            ./releases/*.nupkg
            ./releases/RELEASES
            ./releases/releases.*.json
            ./releases/SHA256SUMS.txt
          body: |
            ## CaptureImage v${{ steps.version.outputs.version }}

            Lightweight Windows screen capture for games without a built-in screenshot key.

            ### Downloads
            - **`Setup.exe`** — Velopack installer. Windows 11 22H2+ only.
            - **`*.nupkg`** — portable Velopack package for manual install / CI updates.
            - **`RELEASES`** — Velopack release manifest.
            - **`SHA256SUMS.txt`** — checksums for manual verification.

            ### Unsigned installer notice
            This release is **not code-signed** yet (OSS signing application
            pending). Windows SmartScreen will show an "Unknown publisher"
            warning on first run. To verify the installer is unmodified:

            1. Download `SHA256SUMS.txt` from this release.
            2. Run `Get-FileHash -Algorithm SHA256 Setup.exe` in PowerShell.
            3. Compare with the entry in `SHA256SUMS.txt`.

            ### Changelog
            See [CHANGELOG.md](https://github.com/poli0981/captureimg/blob/v${{ steps.version.outputs.version }}/CHANGELOG.md).

name: Notify Release Pipeline

# Previously listened to `workflows: ["*"]`. Narrowed to the actual release
# build workflow ("Release" — release.yml) so the Actions tab no longer fills
# with skipped runs after every CI / notify completion. announce-release.yml
# is intentionally NOT included here — it already posts to Discord on its own,
# routing it through this notifier too would double-post.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  actions: read

jobs:
  notify:
    # Pinned to commit SHA — see comment in announce-release.yml.
    uses: poli0981/.github/.github/workflows/notify-release-pipeline.yml@e973e2f15725356653ef07539016670ad2733f83
    secrets: inherit
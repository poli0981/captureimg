name: Announce Release to Discord

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to re-announce"
        required: true
        type: string

# Reusable announce-release.yml only needs `contents: read` to fetch
# release metadata via the gh CLI.
permissions:
  contents: read

jobs:
  announce:
    # Pinned to commit SHA instead of @main — guards against a malicious or
    # accidental push to poli0981/.github landing in our release pipeline
    # silently. Dependabot bumps this weekly via the github-actions ecosystem
    # rule in .github/dependabot.yml.
    uses: poli0981/.github/.github/workflows/announce-release.yml@e973e2f15725356653ef07539016670ad2733f83
    with:
      tag_override: ${{ inputs.tag || '' }}
    secrets: inherit
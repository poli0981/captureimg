name: Feature request
description: Suggest a new feature or enhancement.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please check the
        [project plan](https://github.com/poli0981/captureimg/blob/main/CHANGELOG.md)
        to see if your idea is already scheduled.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not the solution.
      placeholder: "I capture a lot of screenshots of speedruns and want them auto-named with the current split."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like the feature to behave?
      placeholder: "Add an {SplitName} token to the file name template, populated from a LiveSplit integration."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated, and why they don't work.

  - type: dropdown
    id: scope
    attributes:
      label: Which part of the app does this touch?
      multiple: true
      options:
        - Dashboard / capture flow
        - Settings
        - Preview / editing
        - Tray / hotkey
        - Localization
        - Update / About / docs
        - Build / release / installer
        - Cloud upload (post-1.0)

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I have searched existing issues for a duplicate.
          required: true
        - label: I understand this is a volunteer-run GPL-3.0 project and nobody is obligated to implement this.
          required: true
